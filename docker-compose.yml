version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: casbin-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-123456}
      POSTGRES_DB: casbin_admin
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - casbin-network

  redis:
    image: redis:7-alpine
    container_name: casbin-redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-123456}
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - casbin-network

  backend:
    build:
      context: .
      dockerfile: services/backend/Dockerfile
    container_name: casbin-backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-123456}@postgres:5432/casbin_admin?schema=public&connection_limit=10
      REDIS_URL: redis://:${REDIS_PASSWORD:-123456}@redis:6379
      PORT: 8080
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      UPLOAD_DIR: /app/uploads
    volumes:
      - upload_data:/app/uploads
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/api', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    networks:
      - casbin-network

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: casbin-frontend
    restart: always
    depends_on:
      - backend
    environment:
      - NODE_ENV=production
    ports:
      - "80:80"
    networks:
      - casbin-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  upload_data:
    driver: local

networks:
  casbin-network:
    driver: bridge
